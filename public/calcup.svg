<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" xmlns:xlink="http://www.w3.org/1999/xlink">
    <!-- Definitions for gradients and shadows -->
    <defs>
        <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#34495e;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
        </linearGradient>
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
            <feOffset dx="10" dy="15" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="insetShadow">
             <feComponentTransfer in="SourceAlpha">
                <feFuncA type="table" tableValues="1 0" />
            </feComponentTransfer>
            <feGaussianBlur stdDeviation="4" />
            <feOffset dx="2" dy="4" result="offsetblur" />
            <feFlood flood-color="black" flood-opacity="0.5" result="color" />
            <feComposite in2="offsetblur" operator="in" />
            <feComposite in2="SourceAlpha" operator="in" />
            <feMerge>
                <feMergeNode in="SourceGraphic" />
                <feMergeNode />
            </feMerge>
        </filter>
        <linearGradient id="btnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ecf0f1;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#bdc3c7;stop-opacity:1" />
        </linearGradient>
         <linearGradient id="btnGradDark" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#7f8c8d;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#556677;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="btnGradOrange" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#e67e22;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#d35400;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Main Body Shape -->
    <rect x="64" y="48" width="384" height="416" rx="40" ry="40" fill="url(#bodyGrad)" filter="url(#dropShadow)" stroke="#1a252f" stroke-width="2" aria-label="Retro Calculator Desk" role="img"/>
    
    <!-- Inner Highlight for bevel effect -->
    <rect x="72" y="56" width="368" height="400" rx="32" ry="32" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

    <!-- Screen Area (Recessed) -->
    <g transform="translate(96, 80)">
        <!-- Outer dark bezel -->
        <rect x="0" y="0" width="320" height="96" rx="12" ry="12" fill="#151b22" filter="url(#insetShadow)"/>
        <!-- LCD Screen -->
        <rect x="16" y="16" width="288" height="64" rx="4" ry="4" fill="#10151a"/>
        <!-- Screen Reflection/Glass -->
        <path d="M16 16 L304 16 L304 40 C200 60 100 60 16 40 Z" fill="rgba(255,255,255,0.05)"/>
        <!-- Text -->
        <text x="272" y="58" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#ffaa00" text-anchor="end" style="text-shadow: 0 0 10px rgba(255,170,0,0.5);" aria-hidden="true">42.0</text>
    </g>

    <!-- Branding / Logo Text -->
    <text x="256" y="192" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="2" xml:space="preserve">CALCUP</text>

    <!-- Buttons Grid -->
    <g transform="translate(96, 212)">
        <!-- Row 1 -->
        <!-- AC -->
        <rect x="0" y="0" width="64" height="48" rx="10" ry="10" fill="url(#btnGradDark)" stroke="#445566" stroke-width="1"/>
        <text x="32" y="32" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ecf0f1" text-anchor="middle" aria-label="Clear" role="img">C</text>
        
        <!-- +/- -->
        <rect x="85" y="0" width="64" height="48" rx="10" ry="10" fill="url(#btnGradDark)" stroke="#445566" stroke-width="1"/>
        <text x="117" y="32" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ecf0f1" text-anchor="middle" aria-label="Plus/Minus" role="img">±</text>

        <!-- % -->
        <rect x="170" y="0" width="64" height="48" rx="10" ry="10" fill="url(#btnGradDark)" stroke="#445566" stroke-width="1"/>
        <text x="202" y="32" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ecf0f1" text-anchor="middle" aria-label="Percent" role="img">%</text>

        <!-- Div -->
        <rect x="255" y="0" width="65" height="48" rx="10" ry="10" fill="url(#btnGradOrange)" stroke="#c35500" stroke-width="1"/>
        <text x="287" y="32" font-family="sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle" aria-label="Divide" role="img">÷</text>

        <!-- Row 2 -->
        <rect x="0" y="64" width="64" height="48" rx="10" ry="10" fill="url(#btnGrad)"/>
        <text x="32" y="96" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle" aria-label="Seven" role="img">7</text>

        <rect x="85" y="64" width="64" height="48" rx="10" ry="10" fill="url(#btnGrad)"/>
        <text x="117" y="96" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle" aria-label="Eight" role="img">8</text>

        <rect x="170" y="64" width="64" height="48" rx="10" ry="10" fill="url(#btnGrad)"/>
        <text x="202" y="96" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle" aria-label="Nine" role="img">9</text>

        <rect x="255" y="64" width="65" height="48" rx="10" ry="10" fill="url(#btnGradOrange)" stroke="#c35500" stroke-width="1"/>
        <text x="287" y="96" font-family="sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle" aria-label="Multiply" role="img">×</text>

        <!-- Row 3 -->
        <rect x="0" y="128" width="64" height="48" rx="10" ry="10" fill="url(#btnGrad)"/>
        <text x="32" y="160" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle" aria-label="Four" role="img">4</text>

        <rect x="85" y="128" width="64" height="48" rx="10" ry="10" fill="url(#btnGrad)"/>
        <text x="117" y="160" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle" aria-label="Five" role="img">5</text>

        <rect x="170" y="128" width="64" height="48" rx="10" ry="10" fill="url(#btnGrad)"/>
        <text x="202" y="160" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle" aria-label="Six" role="img">6</text>

        <rect x="255" y="128" width="65" height="48" rx="10" ry="10" fill="url(#btnGradOrange)" stroke="#c35500" stroke-width="1"/>
        <text x="287" y="160" font-family="sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle" aria-label="Minus" role="img">-</text>
        
        <!-- Row 4 (Partial, skipping 1-3 for design balance or merging 0) -->
        <!-- Actually let's just do standard layout -->
         <rect x="0" y="192" width="64" height="48" rx="10" ry="10" fill="url(#btnGrad)"/>
        <text x="32" y="224" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle" aria-label="One" role="img">1</text>

        <rect x="85" y="192" width="64" height="48" rx="10" ry="10" fill="url(#btnGrad)"/>
        <text x="117" y="224" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle" aria-label="Two" role="img">2</text>

        <rect x="170" y="192" width="64" height="48" rx="10" ry="10" fill="url(#btnGrad)"/>
        <text x="202" y="224" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle" aria-label="Three" role="img">3</text>

        <rect x="255" y="192" width="65" height="48" rx="10" ry="10" fill="url(#btnGradOrange)" stroke="#c35500" stroke-width="1"/>
        <text x="287" y="228" font-family="sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle" aria-label="Plus" role="img">+</text>

    </g>
</svg>